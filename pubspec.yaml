name: novel_reader
description: "A professional-grade, highly customizable Novel/Ebook reader package for Flutter. Supports vertical scroll, horizontal paging, professional themes, and full state persistence."
version: 1.0.1
homepage: https://github.com/sreejithes/novel_reader
repository: https://github.com/sreejithes/novel_reader

environment:
  sdk: ^3.0.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  plugin_platform_interface: ^2.1.8
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  scrollable_positioned_list: ^0.3.8
  intl: ^0.19.0
  path_provider: ^2.1.3
  screen_brightness: ^2.1.9
  wakelock_plus: ^1.1.4
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: com.sree.novel_reader
        pluginClass: NovelReaderPlugin
      ios:
        pluginClass: NovelReaderPlugin
      linux:
        pluginClass: NovelReaderPlugin
      macos:
        pluginClass: NovelReaderPlugin
      windows:
        pluginClass: NovelReaderPluginCApi
      web:
        pluginClass: NovelReaderWeb
        fileName: novel_reader_web.dart
