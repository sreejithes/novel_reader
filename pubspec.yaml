name: novel_reader
description: "A production-ready, highly customizable Novel/Ebook Reader package for Flutter."
version: 0.0.1
homepage: https://github.com/your-username/novel_reader

environment:
  sdk: ^3.7.0-267.0.dev
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  plugin_platform_interface: ^2.0.2
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  google_fonts: ^6.3.0
  scrollable_positioned_list: ^0.3.8
  intl: ^0.19.0
  path_provider: ^2.1.3
  screen_brightness: ^2.1.9
  wakelock_plus: ^1.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: com.sree.novel_reader
        pluginClass: NovelReaderPlugin
      ios:
        pluginClass: NovelReaderPlugin
      linux:
        pluginClass: NovelReaderPlugin
      macos:
        pluginClass: NovelReaderPlugin
      windows:
        pluginClass: NovelReaderPluginCApi
      web:
        pluginClass: NovelReaderWeb
        fileName: novel_reader_web.dart
  # fonts:
  #   - family: Georgia
  #     fonts:
  #       - asset: fonts/Georgia.ttf
